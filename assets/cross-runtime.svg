<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-label="AgenticCodebase cross-runtime surface in Agentra design system">
  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c9c6bb"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f1f1f"/>
    </marker>
    <style><![CDATA[
      .mono { font-family:'IBM Plex Mono','JetBrains Mono',monospace; }
      .ink { fill:#121212; }
      .muted { fill:#6d6a63; }
      .accent { fill:#ea580c; }
      .card { fill:#fffdf6; stroke:#1f1f1f; stroke-width:1.8; }
    ]]></style>
  </defs>

  <rect width="760" height="320" fill="#f2f1ea"/>
  <rect width="760" height="320" fill="url(#grid)"/>
  <line x1="14" y1="24" x2="746" y2="24" stroke="#1f1f1f"/>
  <text x="14" y="17" class="mono muted" font-size="10" letter-spacing="1.6">// CROSS_RUNTIME CODE INTELLIGENCE</text>

  <rect x="20" y="40" width="720" height="260" class="card"/>

  <rect x="44" y="78" width="150" height="46" rx="8" class="card"/>
  <text x="119" y="106" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">RUST CLI</text>

  <rect x="44" y="148" width="150" height="46" rx="8" class="card"/>
  <text x="119" y="176" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">MCP SERVER</text>

  <rect x="44" y="218" width="150" height="46" rx="8" class="card"/>
  <text x="119" y="246" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">FUTURE SDKS</text>

  <rect x="300" y="118" width="160" height="84" rx="10" fill="#ece7d8" stroke="#1f1f1f" stroke-width="2"/>
  <text x="380" y="147" class="mono muted" text-anchor="middle" font-size="10" letter-spacing="1.3">PORTABLE ARTIFACT</text>
  <text x="380" y="175" class="mono accent" text-anchor="middle" font-size="24" font-weight="700">.ACB</text>
  <text x="380" y="193" class="mono ink" text-anchor="middle" font-size="10" letter-spacing="1.1">semantic graph + temporal signals</text>

  <rect x="566" y="78" width="150" height="46" rx="8" class="card"/>
  <text x="641" y="106" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">DEPENDENCY MAP</text>

  <rect x="566" y="148" width="150" height="46" rx="8" class="card"/>
  <text x="641" y="176" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">IMPACT FORECAST</text>

  <rect x="566" y="218" width="150" height="46" rx="8" class="card"/>
  <text x="641" y="246" class="mono ink" font-size="12" text-anchor="middle" letter-spacing="1">PROPHECY SIGNALS</text>

  <line x1="194" y1="101" x2="300" y2="148" stroke="#1f1f1f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="194" y1="171" x2="300" y2="160" stroke="#1f1f1f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="194" y1="241" x2="300" y2="172" stroke="#1f1f1f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <line x1="460" y1="148" x2="566" y2="101" stroke="#1f1f1f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="460" y1="160" x2="566" y2="171" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="460" y1="172" x2="566" y2="241" stroke="#1f1f1f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text x="34" y="286" class="mono muted" font-size="10" letter-spacing="1.2">ONE CODE MAP FEEDS MULTIPLE RUNTIME SURFACES WITHOUT RECOMPILATION</text>
  <circle cx="728" cy="282" r="4" class="accent"/>
</svg>

  <line x1="520" y1="292" x2="1308" y2="292" stroke="#1f1f1f" stroke-width="2"/>
  <text x="520" y="318" class="mono ink" font-size="12" letter-spacing="2">AGENTICCODEBASE</text>
  <text x="860" y="318" class="mono ink" font-size="12" letter-spacing="2">COMPILE + QUERY + PROPHECY</text>
  <circle cx="1308" cy="314" r="5" fill="#ea580c"/>

  <text x="1338" y="26" class="mono muted" font-size="13" text-anchor="end" letter-spacing="2">TICK:1003</text>

  <rect x="28" y="60" width="430" height="274" fill="#fffdf6" stroke="#1f1f1f" stroke-width="2"/>

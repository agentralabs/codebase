  <rect x="44" y="108" width="398" height="194" fill="#0f0f10" stroke="#1f1f1f" stroke-width="1.5"/>
  <rect x="72" y="144" width="104" height="26" fill="none" stroke="#3b3832"/>
  <text x="124" y="161" class="mono" font-size="10" fill="#f4f2eb" text-anchor="middle">UserService</text>
  <rect x="206" y="132" width="104" height="26" fill="none" stroke="#3b3832"/>
  <text x="258" y="149" class="mono" font-size="10" fill="#f4f2eb" text-anchor="middle">AuthFlow</text>
  <rect x="338" y="170" width="78" height="26" fill="none" stroke="#3b3832"/>
  <text x="377" y="187" class="mono" font-size="10" fill="#f4f2eb" text-anchor="middle">Tests</text>
  <line x1="176" y1="157" x2="206" y2="145" stroke="#ea580c" stroke-width="2"/>
  <line x1="310" y1="145" x2="338" y2="183" stroke="#ea580c" stroke-width="2"/>
  <line x1="124" y1="170" x2="124" y2="236" stroke="#2f2c28"/>
  <line x1="258" y1="158" x2="258" y2="236" stroke="#2f2c28"/>
  <circle cx="124" cy="236" r="4" fill="#ea580c"/>
  <circle cx="258" cy="236" r="4" fill="#ea580c"/>
  <circle cx="377" cy="183" r="4" fill="#ea580c"/>

  <text x="44" y="325" class="mono" font-size="11" fill="#5f5a52" letter-spacing="1.6">SIGNAL: SEMANTIC EDGES + IMPACT + PROPHECY</text>

  <line x1="480" y1="60" x2="480" y2="334" stroke="#1f1f1f" stroke-width="2"/>
  <text x="520" y="132" class="sans ink" font-size="66" font-weight="700" letter-spacing="1">SEMANTIC</text>
  <text x="520" y="195" class="sans accent" font-size="66" font-weight="700" letter-spacing="1">CODE INTELLIGENCE</text>

